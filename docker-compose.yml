services:
  frontend:
    build: .
    container_name: portafolio_frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portafolio.rule=Host(`portafolio.dev-labenginnering.com`)"
      - "traefik.http.routers.portafolio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portafolio.entrypoints=websecure"
      - "traefik.http.services.portafolio.loadbalancer.server.port=80"

networks:
  proxy:
    external: true